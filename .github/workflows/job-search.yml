name: AI Job Search

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Job Agent
        run: |
          python main.py
